<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f14">
  <meta name="description" content="Claude AI Chat - Mobile Client">
  <title>Claude Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>設定</h2>
        <button class="modal-close" id="closeSettings" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="apiKeyInput">API Key</label>
          <div class="api-key-wrapper">
            <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
            <button class="toggle-visibility" id="toggleApiKey" aria-label="Toggle visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="setting-hint">Anthropic Console → API Keys から取得</p>
        </div>
        <div class="setting-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-opus-4-5-20251101">Claude Opus 4.5</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (速い・安い)</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="systemPrompt">System Prompt</label>
          <textarea id="systemPrompt" rows="4" placeholder="(オプション) AIの振る舞いを指定..."></textarea>
        </div>
        <div class="setting-group">
          <label for="knowledgeText">ナレッジ</label>
          <textarea id="knowledgeText" rows="4" placeholder="会話に付与する知識や設定文..."></textarea>
          <p class="setting-hint">オンにした会話で、システムプロンプトの後ろに自動付与される</p>
        </div>
        <div class="setting-group">
          <div class="toggle-row">
            <label for="knowledgeToggle">この会話でナレッジを使う</label>
            <label class="toggle-switch">
              <input type="checkbox" id="knowledgeToggle" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <button class="btn-save" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>会話履歴</h2>
      <button class="btn-new-chat" id="newChatBtn" aria-label="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新規チャット
      </button>
    </div>
    <div class="conversation-list" id="conversationList"></div>
  </aside>

  <!-- Main App -->
  <div class="app">
    <header class="app-header">
      <button class="btn-icon" id="menuBtn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-center">
        <h1 id="headerTitle">Claude Chat</h1>
        <span class="model-badge" id="modelBadge">Sonnet</span>
      </div>
      <button class="btn-icon" id="settingsBtn" aria-label="Settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </button>
    </header>

    <main class="chat-container" id="chatContainer">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p>メッセージを送信して会話を始める</p>
      </div>
      <div class="messages" id="messages"></div>
    </main>

    <footer class="input-area">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="メッセージを入力..." rows="1" autocomplete="off"></textarea>
        <button class="btn-send" id="sendBtn" aria-label="Send" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
